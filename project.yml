name: YesChef
options:
  bundleIdPrefix: com.jonphillips
  deploymentTarget:
    iOS: "27.0"
packages:
  YesChefPackage:
    path: YesChefPackage
  WebExtractorKit:
    path: ../../jon-platform/packages/WebExtractorKit
  CasePaths:
    url: https://github.com/pointfreeco/swift-case-paths
    from: 1.0.0
  SwiftNavigation:
    url: https://github.com/pointfreeco/swift-navigation
    from: 2.0.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.0
settings:
  base:
    SWIFT_VERSION: 6.0
targets:
  YesChef:
    type: application
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: YesChefApp
    info:
      path: YesChefApp/Info.plist
      properties:
        CFBundleDisplayName: Yes Chef
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIApplicationSupportsIndirectInputEvents: true
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen: {}
    dependencies:
      - package: YesChefPackage
        product: YesChefCore
      - package: WebExtractorKit
        product: WebExtractorKit
      - package: CasePaths
        product: CasePaths
      - package: SwiftNavigation
        product: SwiftUINavigation
      - package: ZIPFoundation
        product: ZIPFoundation
      - target: YesChefShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonphillips.yeschef
        PRODUCT_NAME: YesChef
        CODE_SIGN_ENTITLEMENTS: YesChefApp/YesChef.entitlements
        DEVELOPMENT_TEAM: 7MQEE539G9
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  YesChefShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: YesChefShareExtension
    dependencies:
      - package: YesChefPackage
        product: YesChefCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonphillips.yeschef.share-extension
        PRODUCT_NAME: YesChefShareExtension
        CODE_SIGN_ENTITLEMENTS: YesChefShareExtension/YesChefShareExtension.entitlements
        DEVELOPMENT_TEAM: 7MQEE539G9
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: YesChefShareExtension/Info.plist
        MARKETING_VERSION: "1.0"
        APPLICATION_EXTENSION_API_ONLY: YES
schemes:
  YesChef:
    build:
      targets:
        YesChef: all
        YesChefShareExtension: all
    run:
      config: Debug
