<!DOCTYPE html>
<html>
<body>
  <div class="recipe" itemscope itemtype="http://schema.org/Recipe">
    <h1 itemprop="name" class="name">Layered Enchiladas</h1>
    <p class="metadata">
      <b>Difficulty: </b><span itemprop="recipeDifficulty">Medium</span>
    </p>
    <div class="ingredients text">
      <p class="line" itemprop="recipeIngredient">CHICKEN</p>
      <p class="line" itemprop="recipeIngredient"><strong>2</strong> cups shredded chicken</p>
      <p class="line" itemprop="recipeIngredient">Kosher salt, to taste</p>
      <p class="line" itemprop="recipeIngredient">SAUCE</p>
      <p class="line" itemprop="recipeIngredient"><strong>1</strong> can crushed tomatoes</p>
      <p class="line" itemprop="recipeIngredient"><strong>2</strong> chipotle peppers</p>
    </div>
    <div itemprop="recipeInstructions" class="directions text">
      <p class="line">Shred the chicken.</p>
      <p class="line">Layer and bake.</p>
    </div>
  </div>
</body>
</html>
