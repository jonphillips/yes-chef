    <p itemprop="aggregateRating" class="rating" value="0"></p>

      <b>Servings: </b><span itemprop="recipeYield">Serves 1 cup</span>

    <div class="ingredients text">
      <p class="line" itemprop="recipeIngredient"><strong>5</strong> scallions, sliced thin</p>
      <p class="line" itemprop="recipeIngredient"><strong>1/3</strong> cup minced fresh ginger</p>
      <p class="line" itemprop="recipeIngredient"><strong>1/2</strong> cup vegetable oil</p>
    </div>
    <div itemprop="recipeInstructions" class="directions text">
      <p class="line">Pour hot oil over the scallions and ginger, then stir in vinegar.</p>
    </div>
