name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/realm/swiftlint:0.63.3
    steps:
      - uses: actions/checkout@v4
      - name: Run drift lint
        run: swiftlint lint --strict --config .swiftlint.yml

  test:
    name: Swift package tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select toolchain and check capability
        id: toolchain
        # The project tracks the Xcode 27 / Swift 6.4 beta (Package.swift declares
        # // swift-tools-version: 6.4; platforms iOS 27 / macOS 26). GitHub-hosted
        # runners don't carry that toolchain yet, and a manifest newer than the
        # runner's Swift can't even be parsed. So: prefer a local Xcode beta if the
        # image happens to have one, then SKIP the tests (green, not failed) when the
        # available Swift is older than the manifest requires — verification happens
        # locally until hosted runners ship Xcode 27, at which point this runs for
        # real with no further change. We never fake a pass.
        run: |
          if [ -d /Applications/Xcode-beta.app/Contents/Developer ]; then
            echo "DEVELOPER_DIR=/Applications/Xcode-beta.app/Contents/Developer" >> "$GITHUB_ENV"
          fi
          required="$(sed -n 's#^// swift-tools-version: *\([0-9.]*\).*#\1#p' YesChefPackage/Package.swift | head -1)"
          have="$(swift -version 2>/dev/null | sed -n 's/.*Swift version \([0-9][0-9]*\.[0-9][0-9]*\).*/\1/p' | head -1)"
          echo "Manifest requires Swift tools $required; runner has ${have:-unknown}."
          if [ -n "$have" ] && [ "$(printf '%s\n%s\n' "$required" "$have" | sort -V | head -1)" = "$required" ]; then
            echo "runnable=true" >> "$GITHUB_OUTPUT"
          else
            echo "runnable=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Runner Swift ${have:-unknown} < required $required (Xcode 27 / Swift 6.4 beta). Skipping swift test until hosted runners ship a matching toolchain — verify locally with: swift test --package-path YesChefPackage"
          fi
      - name: Run package tests
        if: steps.toolchain.outputs.runnable == 'true'
        run: swift test --package-path YesChefPackage
